<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DockMove Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <nav class="border-b border-slate-800 bg-slate-950 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-amber-500 p-2 rounded-lg text-slate-950">
                    <i class="fa-solid fa-truck-ramp-box text-xl"></i>
                </div>
                <span class="text-xl font-bold tracking-wider text-amber-400">dockmove</span>
            </div>
            <div class="text-sm bg-slate-800 px-3 py-1 rounded-full text-slate-300">
                <span class="inline-block w-2.5 h-2.5 bg-emerald-500 rounded-full mr-2"></span>Host Connection: Online
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 md:p-8 space-y-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-cubes text-amber-500"></i> Active Host Containers
                    </h2>
                    <button onclick="loadContainers()" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-200 px-3 py-1.5 rounded transition">
                        <i class="fa-solid fa-rotate mr-1.5"></i> Refresh List
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-slate-300">
                        <thead>
                            <tr class="border-b border-slate-800 text-slate-400 font-medium">
                                <th class="pb-3 w-8"></th>
                                <th class="pb-3">Container Name</th>
                                <th class="pb-3">Docker Image</th>
                                <th class="pb-3">Status</th>
                                <th class="pb-3 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="container-list" class="divide-y divide-slate-900">
                            <tr>
                                <td colspan="5" class="py-6 text-center text-slate-500">Scanning host daemon...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="space-y-8">
                <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-xl">
                    <h3 class="text-md font-semibold text-slate-200 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-sliders text-amber-500"></i> Backup Configurations
                    </h3>
                    <div class="space-y-4 text-sm text-slate-300">
                        <label class="flex items-center space-x-3 cursor-pointer">
                            <input id="include-volumes-toggle" type="checkbox" checked class="w-4.5 h-4.5 rounded text-amber-500 bg-slate-900 border-slate-700 focus:ring-amber-500">
                            <span>Package Named Volumes</span>
                        </label>
                        <label class="flex items-center space-x-3 cursor-pointer">
                            <input id="pause-toggle" type="checkbox" checked class="w-4.5 h-4.5 rounded text-amber-500 bg-slate-900 border-slate-700 focus:ring-amber-500">
                            <span>Pause Container during execution</span>
                        </label>
                    </div>
                </div>

                <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-xl">
                    <h3 class="text-md font-semibold text-slate-200 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-up text-amber-500"></i> Restore Container Pipeline
                    </h3>
                    <div id="dropzone" class="border-2 border-dashed border-slate-800 hover:border-amber-500/50 rounded-lg p-6 text-center cursor-pointer transition bg-slate-900/50">
                        <i class="fa-solid fa-box-archive text-3xl text-slate-600 mb-3"></i>
                        <p class="text-sm font-medium">Click to select backup archive</p>
                        <p class="text-xs text-slate-500 mt-1">Accepts raw .zip files created via dockmove</p>
                        <input type="file" id="file-input" class="hidden" accept=".zip">
                    </div>
                    <div id="restore-status" class="mt-4 text-sm hidden"></div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const API_BASE = "";

        async function loadContainers() {
            const tbody = document.getElementById("container-list");
            tbody.innerHTML = `<tr><td colspan="5" class="py-6 text-center text-slate-400"><i class="fa-solid fa-spinner animate-spin mr-2"></i> Fetching details...</td></tr>`;
            
            try {
                const response = await fetch(`${API_BASE}/api/containers`);
                const containers = await response.json();
                
                if (containers.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="py-6 text-center text-slate-500">No containers found on target system.</td></tr>`;
                    return;
                }

                tbody.innerHTML = "";
                containers.forEach(c => {
                    const statusColor = c.status === "running" ? "text-emerald-500" : "text-slate-500";
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-900/50 transition duration-150">
                            <td class="py-4"><i class="fa-brands fa-docker text-slate-600"></i></td>
                            <td class="py-4 font-semibold text-slate-200">${c.name}</td>
                            <td class="py-4 text-slate-400 font-mono text-xs">${c.image}</td>
                            <td class="py-4">
                                <span class="flex items-center text-xs font-semibold ${statusColor}">
                                    <span class="inline-block w-2 h-2 rounded-full mr-2 bg-current"></span>${c.status}
                                </span>
                            </td>
                            <td class="py-4 text-right">
                                <button onclick="triggerBackup('${c.id}', '${c.name}')" class="bg-amber-500 hover:bg-amber-600 text-slate-950 text-xs font-bold px-3.5 py-2 rounded-lg transition duration-200">
                                    <i class="fa-solid fa-download mr-1"></i> Backup
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="5" class="py-6 text-center text-rose-500"><i class="fa-solid fa-triangle-exclamation mr-1.5"></i> Call failed: Ensure docker.sock is mounted correctly.</td></tr>`;
            }
        }

        async function triggerBackup(id, name) {
            const includeVolumes = document.getElementById('include-volumes-toggle').checked;
            const pauseContainer = document.getElementById('pause-toggle').checked;

            const formData = new FormData();
            formData.append("container_id", id);
            formData.append("include_volumes", includeVolumes);
            formData.append("pause_during_backup", pauseContainer);

            try {
                const overlay = document.createElement("div");
                overlay.className = "fixed inset-0 bg-slate-950/80 flex flex-col justify-center items-center z-50 text-slate-200";
                overlay.innerHTML = `
                    <div class="text-center space-y-4">
                        <i class="fa-solid fa-compact-disc animate-spin text-5xl text-amber-500"></i>
                        <h3 class="text-lg font-bold">Packaging Container Environment</h3>
                        <p class="text-sm text-slate-400">Compiling configuration profiles & named volume sets...</p>
                    </div>
                `;
                document.body.appendChild(overlay);

                const response = await fetch(`${API_BASE}/api/backup`, {
                    method: "POST",
                    body: formData
                });

                document.body.removeChild(overlay);

                if (!response.ok) {
                    const err = await response.json();
                    alert(`Backup Failed: ${err.detail}`);
                    return;
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${name}_backup.zip`;
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch (err) {
                alert(`Error executing export command: ${err.message}`);
            }
        }

        const dropzone = document.getElementById("dropzone");
        const fileInput = document.getElementById("file-input");
        const restoreStatus = document.getElementById("restore-status");

        dropzone.addEventListener("click", () => fileInput.click());
        fileInput.addEventListener("change", handleFileSelection);

        async function handleFileSelection(e) {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append("file", file);

            restoreStatus.classList.remove("hidden", "text-rose-500", "text-emerald-500");
            restoreStatus.className = "mt-4 text-sm text-amber-500 font-medium";
            restoreStatus.innerHTML = `<i class="fa-solid fa-sync animate-spin mr-1.5"></i> Running restore pipeline...`;

            try {
                const response = await fetch(`${API_BASE}/api/restore`, {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();
                if (response.ok) {
                    restoreStatus.className = "mt-4 text-sm text-emerald-500 font-semibold";
                    restoreStatus.innerHTML = `<i class="fa-solid fa-circle-check mr-1.5"></i> Success: ${result.message}`;
                    loadContainers();
                } else {
                    restoreStatus.className = "mt-4 text-sm text-rose-500 font-semibold";
                    restoreStatus.innerHTML = `<i class="fa-solid fa-circle-xmark mr-1.5"></i> Restore failed: ${result.detail}`;
                }
            } catch (err) {
                restoreStatus.className = "mt-4 text-sm text-rose-500 font-semibold";
                restoreStatus.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-1.5"></i> Connection failed: ${err.message}`;
            }
        }

        window.onload = loadContainers;
    </script>
</body>
</html>
